services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neydi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neydi}
      POSTGRES_DB: ${POSTGRES_DB:-neydi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neydi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./neydi-be
    ports:
      - "8000:8000"
    env_file:
      - ./neydi-be/.env
    environment:
      # Override DB connection to point at the db service instead of localhost
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount source for hot reload; pip packages live in Python site-packages (unaffected)
      - ./neydi-be:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./neydi-fe
    ports:
      - "3000:3000"
    environment:
      # All API calls are client-side (browser), so localhost:8000 is correct here
      NUXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./neydi-fe:/app
      # Keep deps and caches inside the container, not on the host bind mount
      - /app/node_modules
      - /app/.pnpm-store
      - /app/.nuxt
    restart: unless-stopped

volumes:
  postgres_data:
