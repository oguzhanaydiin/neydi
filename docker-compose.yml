services:
  # Local dev ports (8001/3001) — prod native uses 8000/3000 for Cloudflare tunnel.
  # Both can run at the same time.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neydi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neydi}
      POSTGRES_DB: ${POSTGRES_DB:-neydi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neydi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./neydi-be
      target: dev
    ports:
      - "8001:8000"
    env_file:
      - ./neydi-be/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DB_MODE: local
    volumes:
      - ./neydi-be:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./neydi-fe
      target: dev
    ports:
      - "3001:3000"
    environment:
      NUXT_PUBLIC_API_BASE: /api
      NUXT_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./neydi-fe:/app
      - /app/node_modules
      - /app/.pnpm-store
      - /app/.nuxt
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
