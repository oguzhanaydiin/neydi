services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neydi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neydi}
      POSTGRES_DB: ${POSTGRES_DB:-neydi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neydi}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./neydi-be
      target: production
    ports:
      - "8000:8000"
    env_file:
      - ./neydi-be/.env
    environment:
      # Override DB connection to point at the db service instead of localhost
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./neydi-fe
      target: production
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
        NUXT_API_PROXY_TARGET: ${NUXT_API_PROXY_TARGET:-http://backend:8000}
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
