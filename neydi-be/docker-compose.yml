services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neydi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neydi}
      POSTGRES_DB: ${POSTGRES_DB:-neydi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
