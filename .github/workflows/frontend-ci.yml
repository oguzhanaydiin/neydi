name: frontend ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: neydi-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: neydi-fe

      - name: Lint
        run: pnpm run lint
        working-directory: neydi-fe

      - name: Typecheck
        run: pnpm run typecheck
        working-directory: neydi-fe
